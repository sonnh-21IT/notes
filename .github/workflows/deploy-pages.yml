name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel superseded builds on rapid pushes; deploy job still serializes via needs.
concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Required so Environment secrets (github-pages) are available at Vite build time.
    # Repo-level secrets also work; without this env, empty VITE_* bake into a broken deploy.
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Prefer offline hits from setup-node's npm cache; skip audit/fund noise.
      - run: npm ci --prefer-offline --no-audit --no-fund

      - uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('package-lock.json', 'eslint.config.js') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      # One install, lint ∥ test — usually faster than sequential on 2+ vCPU runners.
      - name: Lint and test
        run: |
          set -e
          npm run lint &
          lint_pid=$!
          npm run test &
          test_pid=$!
          lint_ec=0
          test_ec=0
          wait "$lint_pid" || lint_ec=$?
          wait "$test_pid" || test_ec=$?
          if [ "$lint_ec" -ne 0 ] || [ "$test_ec" -ne 0 ]; then
            echo "lint exit=$lint_ec test exit=$test_ec"
            exit 1
          fi

      - name: Check Pages build secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::error::Missing VITE_SUPABASE_URL (set Repository or github-pages Environment secret)"
            missing=1
          fi
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing VITE_SUPABASE_ANON_KEY (set Repository or github-pages Environment secret)"
            missing=1
          fi
          exit "$missing"

      - name: Build
        run: npm run build:pages
        env:
          VITE_BASE_PATH: /notes/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
